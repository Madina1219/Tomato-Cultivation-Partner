name: tomato_companion
description: "TomatoCompanion — your daily AI growing companion for tomato growers worldwide"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Image picking
  image_picker: ^1.1.2

  # Location
  geolocator: ^14.0.2
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.2

  # UI helpers
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  firebase_core: ^4.8.0
  cloud_firestore: ^6.4.0
  firebase_auth: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/varieties.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/tomato_icon_1024.png"
  adaptive_icon_background: "#FFE0D0"
  adaptive_icon_foreground: "assets/branding/tomato_foreground_1024.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#E84B3D"
  image: "assets/branding/tomato_foreground_1024.png"
  android: true
  ios: true
  android_12:
    color: "#E84B3D"
    image: "assets/branding/tomato_foreground_1024.png"