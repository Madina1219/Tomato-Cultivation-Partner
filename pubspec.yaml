name: tomato_companion
description: "TomatoCompanion — your daily AI growing companion for tomato growers worldwide"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.2

  # UI helpers
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/varieties.json
  



